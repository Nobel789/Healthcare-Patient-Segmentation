# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify no merge conflict markers
        run: |
          python - <<'PY'
          from pathlib import Path

          markers = ("<" * 7, "=" * 7, ">" * 7)
          ignored_dirs = {".git", ".venv", "venv", "__pycache__", ".mypy_cache", ".pytest_cache"}
          failures = []

          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if any(part in ignored_dirs for part in path.parts):
                  continue
              try:
                  with path.open("r", encoding="utf-8", errors="ignore") as handle:
                      for line_no, line in enumerate(handle, start=1):
                          if line.startswith(markers):
                              failures.append(f"{path}:{line_no}")
              except OSError:
                  continue

          if failures:
              print("Merge conflict markers were found. Resolve conflicts before deploying.")
              print("\n".join(failures))
              raise SystemExit(1)
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
